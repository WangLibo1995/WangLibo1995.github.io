<script>
    $(document).ready(function () {
        {% if site.google_scholar_stats_use_cdn %}
        var gsDataBaseUrl = 'https://cdn.jsdelivr.net/gh/{{ site.repository }}@'
        {% else %}
        var gsDataBaseUrl = 'https://raw.githubusercontent.com/{{ site.repository }}/'
        {% endif %}
        var expectedScholarId = '{{ site.author.googlescholar | split: "user=" | last | split: "&" | first }}';
        var formatNumber = function (value) {
            return String(value).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
        };
        $.getJSON(gsDataBaseUrl + "google-scholar-stats/gs_data.json", function (data) {
            if (!data || (data['scholar_id'] && expectedScholarId && data['scholar_id'] !== expectedScholarId)) {
                return;
            }

            if (typeof data['citedby'] !== 'undefined') {
                var totalCitation = formatNumber(data['citedby']);
                Array.prototype.forEach.call(document.getElementsByClassName('total_cit'), function (element) {
                    element.textContent = totalCitation;
                });
            }

            if (data['updated']) {
                var updatedDate = String(data['updated']).split(' ')[0];
                Array.prototype.forEach.call(document.getElementsByClassName('gs_updated'), function (element) {
                    element.textContent = 'updated ' + updatedDate;
                });
            }

            var publications = data['publications'] || {};
            Array.prototype.forEach.call(document.getElementsByClassName('show_paper_citations'), function (element) {
                var paperId = element.getAttribute('data');
                var paper = publications[paperId];
                if (paper && typeof paper['num_citations'] !== 'undefined') {
                    element.textContent = '| Citations: ' + formatNumber(paper['num_citations']);
                }
            });
        });
    })
</script>
